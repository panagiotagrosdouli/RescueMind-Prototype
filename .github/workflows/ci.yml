name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e '.[dev]'
      - run: ruff check .
      - run: black --check .
      - run: pytest --cov=rescuemind --cov-report=term-missing
      - run: python scripts/run_all.py --mode smoke
      - run: python scripts/run_all.py --mode fusion
      - run: python scripts/run_all.py --mode coordination
