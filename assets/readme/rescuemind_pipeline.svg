<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="720" viewBox="0 0 1600 720" role="img" aria-labelledby="title desc"><title id="title">RescueMind research pipeline</title><desc id="desc">Synthetic disaster sensing, reliability-aware fusion, survivor hypotheses, rescue priority, coordination, and human-supervised decision support.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#071522"/><stop offset="1" stop-color="#173047"/></linearGradient><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0 L12 6 L0 12Z" fill="#7dd3fc"/></marker><filter id="s"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity=".3"/></filter></defs><rect width="1600" height="720" rx="28" fill="url(#bg)"/><text x="800" y="68" text-anchor="middle" fill="#f8fafc" font-family="Arial" font-size="42" font-weight="700">RescueMind — Uncertainty-Aware Rescue Decision Support</text><text x="800" y="108" text-anchor="middle" fill="#b7c9dc" font-family="Arial" font-size="21">From heterogeneous synthetic sensing to auditable, human-supervised rescue priorities</text><g filter="url(#s)" font-family="Arial"><rect x="55" y="205" width="255" height="260" rx="24" fill="#112f49" stroke="#4f87b3" stroke-width="2"/><rect x="365" y="205" width="255" height="260" rx="24" fill="#12364a" stroke="#4d9a99" stroke-width="2"/><rect x="675" y="205" width="255" height="260" rx="24" fill="#173b43" stroke="#4dbb98" stroke-width="2"/><rect x="985" y="205" width="255" height="260" rx="24" fill="#26384f" stroke="#8b8fd3" stroke-width="2"/><rect x="1295" y="205" width="250" height="260" rx="24" fill="#342e46" stroke="#b58bd4" stroke-width="2"/><g fill="#f8fafc" text-anchor="middle"><text x="182" y="250" font-size="18" font-weight="700">HETEROGENEOUS SENSING</text><text x="182" y="320" font-size="27" font-weight="700">UAV • UGV • Nodes</text><text x="182" y="360" font-size="18" fill="#b7c9dc">thermal • RGB • acoustic</text><text x="182" y="389" font-size="18" fill="#b7c9dc">radar • environment</text><text x="492" y="250" font-size="18" font-weight="700">RELIABILITY &amp; FUSION</text><text x="492" y="320" font-size="27" font-weight="700">Temporal Alignment</text><text x="492" y="360" font-size="18" fill="#b7c9dc">stale-data rejection</text><text x="492" y="389" font-size="18" fill="#b7c9dc">weighted / Bayesian fusion</text><text x="802" y="250" font-size="18" font-weight="700">DISASTER TWIN</text><text x="802" y="320" font-size="27" font-weight="700">Living World Model</text><text x="802" y="360" font-size="18" fill="#b7c9dc">hazards • accessibility</text><text x="802" y="389" font-size="18" fill="#b7c9dc">survivor hypotheses</text><text x="1112" y="250" font-size="18" font-weight="700">PRIORITY &amp; ALLOCATION</text><text x="1112" y="320" font-size="27" font-weight="700">Rescue Priority</text><text x="1112" y="360" font-size="18" fill="#b7c9dc">intervals • reversals</text><text x="1112" y="389" font-size="18" fill="#b7c9dc">communication-aware tasks</text><text x="1420" y="250" font-size="18" font-weight="700">HUMAN SUPERVISION</text><text x="1420" y="320" font-size="27" font-weight="700">Decision Support</text><text x="1420" y="360" font-size="18" fill="#b7c9dc">grounded explanation</text><text x="1420" y="389" font-size="18" fill="#b7c9dc">confirm • reject • override</text></g></g><g stroke="#7dd3fc" stroke-width="4" marker-end="url(#a)"><line x1="310" y1="335" x2="350" y2="335"/><line x1="620" y1="335" x2="660" y2="335"/><line x1="930" y1="335" x2="970" y2="335"/><line x1="1240" y1="335" x2="1280" y2="335"/></g><rect x="180" y="545" width="1240" height="100" rx="20" fill="#0a1d2d" stroke="#31526d" stroke-width="2"/><text x="800" y="585" text-anchor="middle" fill="#f8fafc" font-family="Arial" font-size="23" font-weight="700">Research boundary</text><text x="800" y="620" text-anchor="middle" fill="#b7c9dc" font-family="Arial" font-size="19">Deterministic synthetic decision-support prototype — not an operational emergency-response or medical system</text><text x="800" y="682" text-anchor="middle" fill="#7891a5" font-family="Arial" font-size="16">Conceptual diagram; not field evidence, a safety guarantee, or autonomous rescue authority</text></svg>